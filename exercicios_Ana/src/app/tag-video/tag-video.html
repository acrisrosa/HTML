<h3>Tags para renderizar Videos</h3>

<p>Iframe é a nossa TAG</p>

<!-- https://youtu.be/7FF2VoFs5ac?si=6yJwydAFHOBcb0rX -->
<div class="video">
    <iframe 
        width="800" 
        height="450" 
        src="https://www.youtube.com/embed/7FF2VoFs5ac?si=6yJwydAFHOBcb0rX" 
        title="Pobre Ex-Namorado"
        frameborder="0"
        allow="accelerometer; 
        autoplay; 
        clipboard-write; 
        encrypted-media; 
        gyroscope; 
        picture-in-picture; 
        web-share"
        allowfullscreen>
    </iframe>
</div>
